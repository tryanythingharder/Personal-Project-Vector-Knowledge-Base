services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "8010:8000"
    environment:
      KB_DATA_DIR: /data
      KORTEX_ADMIN_TOKEN: ${KORTEX_ADMIN_TOKEN}
      KORTEX_USER_TOKEN: ${KORTEX_USER_TOKEN}
      KORTEX_SECRET_KEY: ${KORTEX_SECRET_KEY}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-qdrant}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-kortex_chunks}
    volumes:
      - kb_data:/data

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  kb_data:
  qdrant_storage:
